<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4DGS / 3DGS Mobile Rendering 演进图</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>
</head>
<body>
  <div id="app">
    <svg id="canvas-graph"></svg>

    <div id="info-bar">
      <h1>4DGS / 3DGS 演进图</h1>
      <div class="subtitle">Snap 8 Gen 4 + Vulkan 1.3 调研项目</div>
      <div class="stats" id="stats-text">加载中...</div>
      <div class="hint">派系同色聚类 · 拖拽节点 · 滚轮缩放 · 时间显示在节点内</div>
    </div>

    <div id="faction-filter">
      <h3>派系筛选</h3>
      <div id="faction-list"></div>
      <div id="turning-points-box">
        <h3>转折点 (4)</h3>
        <div id="turning-list"></div>
      </div>
    </div>

    <div id="legend-box">
      <h3>图例</h3>
      <div class="legend-row"><span class="line-swatch" style="background:#fab387;height:2px;"></span>直接引用</div>
      <div class="legend-row"><span class="line-swatch" style="background:#6c7086;height:1px;"></span>间接引用</div>
      <div class="legend-row"><span class="dot-swatch" style="background:#f9e2af;border:2px solid #f9e2af;"></span>⭐⭐⭐ 必读</div>
      <div class="legend-row"><span class="dot-swatch" style="background:#45475a;"></span>⭐⭐ 重要</div>
      <div class="legend-row"><span class="dot-swatch" style="background:#313244;"></span>⭐ 参考</div>
    </div>

    <div id="tooltip"></div>
    <div id="modal">
      <button class="close" onclick="closeModal()">&times;</button>
      <h2 id="modal-title">-</h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
  /* ===== 全局状态 ===== */
  const state = {
    data: null,
    factionEnabled: { A: true, B: true, C: true, D: true, E: true },
    simulation: null,
    svg: null,
    gLinks: null,
    gNodes: null,
    factionCenters: {},
    width: 0,
    height: 0
  };

  /* ===== 初始化 ===== */
  async function init() {
    try {
      const resp = await fetch('data/evolution.json');
      state.data = await resp.json();
    } catch (e) {
      console.error('无法加载 evolution.json:', e);
      document.getElementById('stats-text').textContent = '加载失败: ' + e.message;
      return;
    }

    setupFactionFilter();
    setupTurningList();
    updateStats();
    try {
      setupGraph();
    } catch (e) {
      console.error('setupGraph error:', e);
      document.getElementById('stats-text').textContent = '渲染失败: ' + e.message;
    }
  }

  /* ===== 派系筛选器 ===== */
  function setupFactionFilter() {
    const list = document.getElementById('faction-list');
    Object.entries(state.data.meta.factions).forEach(([key, fac]) => {
      const label = document.createElement('label');
      label.className = 'faction-checkbox';
      label.innerHTML = `
        <input type="checkbox" data-faction="${key}" checked>
        <span class="dot" style="background:${fac.color}"></span>
        <span>${key} · ${fac.name}</span>
        <span class="count" id="count-${key}">0</span>
      `;
      list.appendChild(label);
      label.querySelector('input').addEventListener('change', e => {
        state.factionEnabled[key] = e.target.checked;
        updateVisibility();
      });
    });
  }

  function setupTurningList() {
    const list = document.getElementById('turning-list');
    state.data.meta.turning_points.forEach(tp => {
      const item = document.createElement('div');
      item.className = 'turning-item';
      item.innerHTML = `
        <span class="turning-dot"></span>
        <span class="turning-label">${tp.id}</span>
        <span class="turning-text">${tp.label}</span>
        <span class="turning-year">${tp.x.toFixed(1)}</span>
      `;
      list.appendChild(item);
    });
  }

  function updateStats() {
    const total = state.data.nodes.length;
    const edges = state.data.edges.length;
    const factions = Object.keys(state.data.meta.factions).length;
    document.getElementById('stats-text').innerHTML =
      `${total} 篇 paper notes · ${edges} 条引用边 · ${factions} 个派系 · 4 个转折点`;
    // 派系节点计数
    const factionCounts = {};
    state.data.nodes.forEach(n => { factionCounts[n.faction] = (factionCounts[n.faction] || 0) + 1; });
    Object.entries(factionCounts).forEach(([k, v]) => {
      const el = document.getElementById('count-' + k);
      if (el) el.textContent = v;
    });
  }

  /* ===== 力导向图：派系聚类布局 ===== */
  function setupGraph() {
    const container = document.getElementById('app');
    state.width = window.innerWidth;
    state.height = window.innerHeight;
    const svg = d3.select('#canvas-graph')
      .attr('width', state.width)
      .attr('height', state.height);
    state.svg = svg;

    /* 清空 */
    svg.selectAll('*').remove();

    /* 派系 cluster 背景圆 — 五边形布局 */
    const clusterGroup = svg.append('g').attr('class', 'clusters');
    const factionKeys = Object.keys(state.data.meta.factions);
    const radius = Math.min(state.width, state.height) * 0.32;
    factionKeys.forEach((key, i) => {
      const fac = state.data.meta.factions[key];
      const angle = (i / factionKeys.length) * Math.PI * 2 - Math.PI / 2;
      const cx = state.width / 2 + Math.cos(angle) * radius;
      const cy = state.height / 2 + Math.sin(angle) * radius;
      state.factionCenters[key] = { x: cx, y: cy };
      const nodeCount = state.data.nodes.filter(n => n.faction === key).length;
      const clusterR = 60 + nodeCount * 7;
      clusterGroup.append('circle')
        .attr('cx', cx)
        .attr('cy', cy)
        .attr('r', clusterR)
        .attr('fill', fac.color)
        .attr('fill-opacity', 0.06)
        .attr('stroke', fac.color)
        .attr('stroke-opacity', 0.45)
        .attr('stroke-width', 1.5)
        .attr('stroke-dasharray', '5,4')
        .attr('class', 'cluster-bg cluster-' + key);
      clusterGroup.append('text')
        .attr('x', cx)
        .attr('y', cy - clusterR - 8)
        .attr('text-anchor', 'middle')
        .attr('fill', fac.color)
        .attr('font-size', '15')
        .attr('font-weight', '700')
        .attr('opacity', 0.9)
        .text(`${key} · ${fac.name} (${nodeCount})`);
    });

    /* 容器 */
    const containerG = svg.append('g').attr('class', 'graph-content');
    state.gLinks = containerG.append('g').attr('class', 'links');
    state.gNodes = containerG.append('g').attr('class', 'nodes');

    /* 力模拟 — 边用 source/target 而不是 from/to */
    const linksForSim = state.data.edges.map(e => ({ source: e.from, target: e.to, type: e.type }));
    const simulation = d3.forceSimulation(state.data.nodes)
      .force('link', d3.forceLink(linksForSim).id(d => d.id).distance(60).strength(0.5))
      .force('charge', d3.forceManyBody().strength(-180))
      .force('collision', d3.forceCollide().radius(28))
      .force('factionX', d3.forceX().x(d => state.factionCenters[d.faction]?.x || state.width / 2).strength(0.25))
      .force('factionY', d3.forceY().y(d => state.factionCenters[d.faction]?.y || state.height / 2).strength(0.25))
      .force('center', d3.forceCenter(state.width / 2, state.height / 2).strength(0.02));

    state.simulation = simulation;

    /* 边 */
    const link = state.gLinks
      .selectAll('line')
      .data(linksForSim)
      .join('line')
      .attr('class', d => 'edge edge-' + d.type)
      .attr('stroke', d => d.type === 'direct' ? '#fab387' : '#6c7086')
      .attr('stroke-width', d => d.type === 'direct' ? 1.6 : 0.6)
      .attr('stroke-opacity', d => d.type === 'direct' ? 0.55 : 0.3);

    /* 节点组：外圈 + 内部圆点 + 文字 */
    const nodeG = state.gNodes
      .selectAll('g.node')
      .data(state.data.nodes)
      .join('g')
      .attr('class', d => 'node node-faction-' + d.faction)
      .style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', dragStarted)
        .on('drag', dragged)
        .on('end', dragEnded))
      .on('mouseover', (e, d) => showTooltip(e, d))
      .on('mousemove', (e) => moveTooltip(e))
      .on('mouseout', () => hideTooltip())
      .on('click', (e, d) => openModal(d));

    /* 高亮圈 ⭐⭐⭐ */
    nodeG.filter(d => d.rating && d.rating.includes('⭐⭐⭐'))
      .append('circle')
      .attr('r', 18)
      .attr('fill', 'none')
      .attr('stroke', '#f9e2af')
      .attr('stroke-width', 2)
      .attr('stroke-dasharray', '3,2')
      .attr('class', 'node-highlight');

    /* 主节点圆 */
    nodeG.append('circle')
      .attr('class', 'node-main')
      .attr('r', d => 8 + (d.rating && d.rating.includes('⭐⭐⭐') ? 3 : 0))
      .attr('fill', d => state.data.meta.factions[d.faction].color)
      .attr('stroke', '#1e1e2e')
      .attr('stroke-width', 1.5);

    /* 内圈颜色（编码评级） */
    nodeG.append('circle')
      .attr('class', 'node-inner')
      .attr('r', d => d.rating && d.rating.includes('⭐⭐⭐') ? 4 : (d.rating && d.rating.includes('⭐⭐') ? 3 : 2))
      .attr('fill', d => d.rating && d.rating.includes('⭐⭐⭐') ? '#f9e2af' : (d.rating && d.rating.includes('⭐⭐') ? '#45475a' : '#313244'));

    /* 时间文字 (节点属性，不占布局轴) */
    nodeG.append('text')
      .attr('class', 'node-year')
      .attr('text-anchor', 'middle')
      .attr('dy', '0.35em')
      .attr('fill', '#1e1e2e')
      .attr('font-size', '9px')
      .attr('font-weight', '700')
      .attr('pointer-events', 'none')
      .text(d => {
        const y = String(d.year);
        return y.length >= 4 ? y.slice(2, 4) : y;
      });

    /* 时长标签（始终显示） */
    nodeG.append('text')
      .attr('class', 'node-label')
      .attr('text-anchor', 'middle')
      .attr('dy', '24px')
      .attr('fill', '#bac2de')
      .attr('font-size', '10px')
      .attr('font-weight', '600')
      .attr('pointer-events', 'none')
      .text(d => {
        const l = d.label;
        if (l.length <= 16) return l;
        return l.slice(0, 16) + '…';
      });

    /* tick */
    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x)
        .attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x)
        .attr('y2', d => d.target.y);
      nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    /* 缩放 */
    const zoom = d3.zoom()
      .scaleExtent([0.3, 2.5])
      .on('zoom', (event) => {
        containerG.attr('transform', event.transform);
      });
    svg.call(zoom);

    /* Window resize */
    window.addEventListener('resize', () => {
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      svg.attr('width', state.width).attr('height', state.height);
    });
  }

  function dragStarted(event, d) {
    if (!event.active) state.simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }

  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }

  function dragEnded(event, d) {
    if (!event.active) state.simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  /* ===== Tooltip ===== */
  function showTooltip(e, d) {
    const tt = document.getElementById('tooltip');
    const faction = state.data.meta.factions[d.faction];
    tt.innerHTML = `
      <div class="tt-title">${d.label}</div>
      <div class="tt-row">派系: <strong style="color:${faction.color}">${d.faction} · ${faction.name}</strong></div>
      <div class="tt-row">时间: <strong>${d.year}</strong></div>
      <div class="tt-row">评级: <strong>${d.rating || '-'}</strong></div>
      <div class="tt-row">arxiv: <strong>${d.arxiv || '-'}</strong></div>
    `;
    tt.style.display = 'block';
    moveTooltip(e);
  }

  function moveTooltip(e) {
    const tt = document.getElementById('tooltip');
    tt.style.left = (e.clientX + 14) + 'px';
    tt.style.top = (e.clientY + 14) + 'px';
  }

  function hideTooltip() {
    document.getElementById('tooltip').style.display = 'none';
  }

  /* ===== Modal ===== */
  function openModal(node) {
    const modal = document.getElementById('modal');
    const faction = state.data.meta.factions[node.faction];
    document.getElementById('modal-title').textContent = node.label;
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-row">派系: <strong style="color:${faction.color}">${node.faction} · ${faction.name}</strong></div>
      <div class="modal-row">时间: <strong>${node.year}</strong></div>
      <div class="modal-row">评级: <strong>${node.rating || '-'}</strong></div>
      <div class="modal-row">arxiv: <strong><a href="https://arxiv.org/abs/${node.arxiv}" target="_blank">${node.arxiv}</a></strong></div>
      <div class="modal-row" style="margin-top:10px">
        <a href="../appendix/paper-notes/${node.id}.md" target="_blank">📄 查看 paper note</a>
      </div>
    `;
    modal.classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
  }

  /* ===== 筛选可见性 ===== */
  function updateVisibility() {
    if (!state.gNodes) return;
    state.gNodes.selectAll('g.node')
      .style('display', d => state.factionEnabled[d.faction] ? null : 'none');
    state.gLinks.selectAll('line')
      .style('display', d => {
        const sourceNode = typeof d.source === 'object' ? d.source : state.data.nodes.find(n => n.id === d.source);
        const targetNode = typeof d.target === 'object' ? d.target : state.data.nodes.find(n => n.id === d.target);
        if (!sourceNode || !targetNode) return 'none';
        return state.factionEnabled[sourceNode.faction] && state.factionEnabled[targetNode.faction] ? null : 'none';
      });
    /* 派系 cluster 背景 */
    Object.keys(state.factionCenters).forEach(key => {
      const clusterEl = state.svg.select('.cluster-' + key);
      if (clusterEl) clusterEl.style('display', state.factionEnabled[key] ? null : 'none');
    });
  }

  /* ===== 启动 ===== */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  </script>
</body>
</html>
