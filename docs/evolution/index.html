<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4DGS / 3DGS Mobile Rendering 演进图</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>
</head>
<body>
  <div id="app">
    <svg id="canvas-graph"></svg>

    <div id="info-bar">
      <h1>4DGS / 3DGS 演进图</h1>
      <div class="subtitle">Snap 8 Gen 4 + Vulkan 1.3 调研项目</div>
      <div class="stats" id="stats-text">加载中...</div>
      <div class="hint">派系同色聚类 · 拖拽节点 · 滚轮缩放 · 时间显示在节点内</div>
    </div>

    <div id="faction-filter">
      <h3>派系筛选</h3>
      <div id="faction-list"></div>
      <div id="turning-points-box">
        <h3>转折点 (4)</h3>
        <div id="turning-list"></div>
      </div>
    </div>

    <!-- A1 时间轴播放 HUD -->
    <div id="timeline-hud">
      <div class="hud-row">
        <button id="btn-play" class="hud-btn primary">▶ Play</button>
        <button id="btn-reset" class="hud-btn">⏮ 重置</button>
        <span id="time-display" class="time-display">—.—</span>
        <span id="time-counter" class="time-counter">0 / 0 节点 · 0 / 0 边</span>
      </div>
      <input id="timeline-slider" type="range" min="0" max="0" step="0.05" value="0">
      <div id="timeline-tp-row" class="tp-row">
        <!-- TP markers injected dynamically -->
      </div>
      <div class="hud-hint">拖动滑块定位 · 时间轴可看 50 篇论文如何在 4 个转折点间涌现</div>
    </div>

    <!-- B1 Trending Now 侧栏 toggle -->
    <button id="btn-trending-toggle" class="sidebar-toggle">📊 Trending</button>

    <aside id="trending-sidebar" class="sidebar-closed">
      <div class="sidebar-header">
        <h3>📊 Trending Now</h3>
        <button id="btn-trending-close" class="close-x">×</button>
      </div>
      <div class="sidebar-body">
        <div class="trending-section">
          <div class="trending-label">最近 30 天新增论文</div>
          <div id="trending-recent-list" class="recent-list"></div>
        </div>
        <div class="trending-section">
          <div class="trending-label">派系热度（最近 30 天 / 全部时间）</div>
          <div id="trending-bars"></div>
        </div>
        <div class="trending-section">
          <div class="trending-label">派生指标</div>
          <div id="trending-metrics" class="metrics"></div>
        </div>
      </div>
    </aside>

    <!-- C3 议题搜索 HUD -->
    <div id="search-hud">
      <input id="topic-search" type="text" placeholder="🔍 搜索议题 (e.g. 4DGS, mobile, compression)">
      <span id="search-count" class="search-count"></span>
    </div>

    <!-- B5 Dead End + Trending 派系分布饼图 (C3 secondary) -->
    <div id="search-pie-card" class="info-card hidden">
      <div class="card-title">派系分布</div>
      <div id="search-pie"></div>
      <div id="search-pie-label" class="pie-label"></div>
    </div>

    <div id="legend-box">
      <h3>图例</h3>
      <div class="legend-row"><span class="line-swatch" style="background:#fab387;height:2px;"></span>直接引用</div>
      <div class="legend-row"><span class="line-swatch" style="background:#6c7086;height:1px;"></span>间接引用</div>
      <div class="legend-row"><span class="dot-swatch" style="background:#f9e2af;border:2px solid #f9e2af;"></span>⭐⭐⭐ 必读</div>
      <div class="legend-row"><span class="dot-swatch" style="background:#45475a;"></span>⭐⭐ 重要</div>
      <div class="legend-row"><span class="dot-swatch" style="background:#313244;"></span>⭐ 参考</div>
    </div>

    <div id="tooltip"></div>
    <div id="modal">
      <button class="close" onclick="closeModal()">&times;</button>
      <h2 id="modal-title">-</h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
  /* ===== 全局状态 ===== */
  const state = {
    data: null,
    factionEnabled: { A: true, B: true, C: true, D: true, E: true },
    simulation: null,
    svg: null,
    gLinks: null,
    gNodes: null,
    clusterLabelsLayer: null,
    factionCenters: {},
    width: 0,
    height: 0,
    // 时间轴
    timeMin: 2023.0,
    timeMax: 2027.0,
    currentTime: 0,      // 0 means "all visible"
    isPlaying: false,
    rafId: null,
    playStartMs: 0,
    playStartTime: 0,
    // 搜索
    searchTerm: '',
    // 错误捕获
    __errs: [],
  };
  window.__errs = state.__errs;
  window.addEventListener('error', e => { state.__errs.push(String(e.message || e)); });
  window.addEventListener('unhandledrejection', e => { state.__errs.push(String(e.reason || e)); });

  /* ===== 年份标准化 =====
     输入 "year" 字段两种形态:
       a) 2023.0 / 2024.0 / 2023.7 / 2024.1          -> 真实年份(整数或含小数 = 真实年内月份近似)
       b) YYMM.xx (e.g. 2301.02, 2606.30, 2606.3)    -> YY*100+MM, .xx 是月中修订号
     区分规则: 若 floor(y) 在 [2300, 9999] 区间且 floor(y) % 100 ∈ [1,12] (即尾数像月份),
                则按 YYMM.xx 解析; 否则视为真实年份直接使用。
     输出仍是浮点年份 (e.g. 2301.02 -> 2023 + 0/12 ≈ 2023.0;
                    2606.30 -> 2026 + 5/12 + 0.30/12 ≈ 2026.4417)
  */
  function normalYear(y) {
    if (typeof y !== 'number') y = parseFloat(y);
    if (Number.isNaN(y)) return 0;
    const yy = Math.floor(y);
    // YYMM.xx 检测: 4 位整数 (2300-9999) 且末 2 位像月份 (01-12)
    if (yy >= 2300 && yy <= 9999 && (yy % 100) >= 1 && (yy % 100) <= 12) {
      const frac = y - yy;
      const yyStr = String(yy);
      const yearNum = 2000 + parseInt(yyStr.slice(0, 2), 10);
      const monthNum = parseInt(yyStr.slice(2, 4), 10) - 1;
      return yearNum + monthNum / 12 + frac / 12;
    }
    // 真实年份 (如 2023.0 / 2023.7)
    return y;
  }

  /* ===== 初始化 ===== */
  async function init() {
    try {
      const resp = await fetch('data/evolution.json');
      state.data = await resp.json();
    } catch (e) {
      state.__errs.push('fetch fail: ' + e.message);
      document.getElementById('stats-text').textContent = '加载失败: ' + e.message;
      return;
    }
    // 预计算标准化年份
    state.data.nodes.forEach(n => {
      n._year = normalYear(n.year);
    });
    state.data.meta.turning_points.forEach(tp => {
      tp._x = normalYear(tp.x);
    });

    setupFactionFilter();
    setupTurningList();
    updateStats();
    setupTimelineHud();
    setupSearchHud();
    setupTrendingSidebar();
    computeDeadEndBadges();
    // 默认: 不在播放状态，但 currentTime = timeMax (全部可见)
    state.currentTime = state.timeMax;
    document.getElementById('timeline-slider').value = state.timeMax;
    setupGraph();
    renderTrending();
    updateTimeDisplay(state.currentTime);
  }

  /* ===== 派系筛选器 ===== */
  function setupFactionFilter() {
    const list = document.getElementById('faction-list');
    Object.entries(state.data.meta.factions).forEach(([key, fac]) => {
      const label = document.createElement('label');
      label.className = 'faction-checkbox';
      label.innerHTML = `
        <input type="checkbox" data-faction="${key}" checked>
        <span class="dot" style="background:${fac.color}"></span>
        <span>${key} · ${fac.name}</span>
        <span class="count" id="count-${key}">0</span>
      `;
      list.appendChild(label);
      label.querySelector('input').addEventListener('change', e => {
        state.factionEnabled[key] = e.target.checked;
        updateVisibility();
      });
    });
  }

  function setupTurningList() {
    const list = document.getElementById('turning-list');
    state.data.meta.turning_points.forEach(tp => {
      const item = document.createElement('div');
      item.className = 'turning-item';
      item.dataset.tpId = tp.id;
      item.dataset.tpX = tp._x;
      item.innerHTML = `
        <span class="turning-dot"></span>
        <span class="turning-label">${tp.id}</span>
        <span class="turning-text">${tp.label}</span>
        <span class="turning-year">${tp._x.toFixed(1)}</span>
      `;
      list.appendChild(item);
    });
  }

  function updateStats() {
    const total = state.data.nodes.length;
    const edges = state.data.edges.length;
    const factions = Object.keys(state.data.meta.factions).length;
    document.getElementById('stats-text').innerHTML =
      `${total} 篇 paper notes · ${edges} 条引用边 · ${factions} 个派系 · 4 个转折点`;
    const factionCounts = {};
    state.data.nodes.forEach(n => { factionCounts[n.faction] = (factionCounts[n.faction] || 0) + 1; });
    Object.entries(factionCounts).forEach(([k, v]) => {
      const el = document.getElementById('count-' + k);
      if (el) el.textContent = v;
    });
  }

  /* ===== A1 时间轴播放 HUD ===== */
  function setupTimelineHud() {
    const tMin = Math.min(...state.data.nodes.map(n => n._year));
    const tMax = Math.max(...state.data.nodes.map(n => n._year));
    // timeMin: 向下取整到月份; timeMax: 留 0.05 余量避免 12 月溢出
    state.timeMin = Math.floor(tMin * 12) / 12;
    state.timeMax = Math.min(2026.99, Math.ceil(tMax * 12) / 12 + 0.04);
    const slider = document.getElementById('timeline-slider');
    slider.min = state.timeMin;
    slider.max = state.timeMax;
    slider.step = 0.05;
    // 4 个 TP marker (D3 风格: 沿底部画在进度轨下的相对线)
    const tpRow = document.getElementById('timeline-tp-row');
    tpRow.innerHTML = '';
    state.data.meta.turning_points.forEach(tp => {
      const pct = ((tp._x - state.timeMin) / (state.timeMax - state.timeMin)) * 100;
      const m = document.createElement('div');
      m.className = 'tp-marker';
      m.style.left = pct.toFixed(2) + '%';
      m.dataset.tpId = tp.id;
      m.title = tp.id + ' @ ' + tp._x.toFixed(2) + ' — ' + tp.label;
      const dot = document.createElement('span');
      dot.className = 'tp-marker-dot';
      m.appendChild(dot);
      const lbl = document.createElement('span');
      lbl.className = 'tp-marker-lbl';
      lbl.textContent = tp.id;
      m.appendChild(lbl);
      tpRow.appendChild(m);
    });

    slider.addEventListener('input', (e) => {
      const t = parseFloat(e.target.value);
      state.currentTime = t;
      applyTimeFilter();
      updateTimeDisplay(t);
    });

    document.getElementById('btn-play').addEventListener('click', togglePlay);
    document.getElementById('btn-reset').addEventListener('click', () => {
      stopPlay();
      state.currentTime = state.timeMin;
      slider.value = state.timeMin;
      applyTimeFilter();
      updateTimeDisplay(state.timeMin);
    });
  }

  function togglePlay() {
    if (state.isPlaying) stopPlay();
    else startPlay();
  }
  function startPlay() {
    state.isPlaying = true;
    document.getElementById('btn-play').textContent = '⏸ Pause';
    state.playStartMs = performance.now();
    state.playStartTime = state.currentTime >= state.timeMax - 0.001 ? state.timeMin : state.currentTime;
    state.currentTime = state.playStartTime;
    const slider = document.getElementById('timeline-slider');
    slider.value = state.currentTime;
    applyTimeFilter();
    updateTimeDisplay(state.currentTime);
    const tick = (now) => {
      if (!state.isPlaying) return;
      const dt = (now - state.playStartMs) / 1000;       // 秒
      const speed = 0.7;                                  // 年/秒
      const newTime = state.playStartTime + dt * speed;
      if (newTime >= state.timeMax) {
        state.currentTime = state.timeMax;
        slider.value = state.timeMax;
        applyTimeFilter();
        updateTimeDisplay(state.timeMax);
        stopPlay();
        return;
      }
      state.currentTime = newTime;
      slider.value = newTime;
      applyTimeFilter();
      updateTimeDisplay(newTime);
      state.rafId = requestAnimationFrame(tick);
    };
    state.rafId = requestAnimationFrame(tick);
  }
  function stopPlay() {
    state.isPlaying = false;
    document.getElementById('btn-play').textContent = '▶ Play';
    if (state.rafId) cancelAnimationFrame(state.rafId);
    state.rafId = null;
  }

  function applyTimeFilter() {
    if (!state.gNodes) return;
    const t = state.currentTime;
    // 节点 fade-in: 节点 _year <= t 时 opacity 1, 否则 opacity 0
    state.gNodes.selectAll('g.node')
      .style('opacity', d => d._year <= t ? 1 : 0);
    // 边: 引用关系是静态结构，遵循"目标节点已可见"原则 (简化)
    state.gLinks.selectAll('line')
      .style('opacity', d => {
        const s = typeof d.source === 'object' ? d.source : state.data.nodes.find(n => n.id === d.source);
        const tgt = typeof d.target === 'object' ? d.target : state.data.nodes.find(n => n.id === d.target);
        if (!s || !tgt) return 0;
        if (s._year > t || tgt._year > t) return 0;
        return d.type === 'direct' ? 0.55 : 0.3;
      });
    // TP 高亮: 当前时间跨越某个 TP (即 [tp.x - 0.1, tp.x + 0.1])
    state.data.meta.turning_points.forEach(tp => {
      const active = Math.abs(t - tp._x) < 0.12;
      const el = document.querySelector(`#timeline-tp-row .tp-marker[data-tp-id="${tp.id}"]`);
      if (el) el.classList.toggle('active', active);
      const listItem = document.querySelector(`#turning-list .turning-item[data-tp-id="${tp.id}"]`);
      if (listItem) listItem.classList.toggle('active', active);
    });
    // 计数
    const visible = state.data.nodes.filter(n => n._year <= t).length;
    const visibleEdges = state.data.edges.filter(e => {
      const s = state.data.nodes.find(n => n.id === e.from);
      const tgt = state.data.nodes.find(n => n.id === e.to);
      return s && tgt && s._year <= t && tgt._year <= t;
    }).length;
    document.getElementById('time-counter').textContent =
      `${visible} / ${state.data.nodes.length} 节点 · ${visibleEdges} / ${state.data.edges.length} 边`;
  }

  function updateTimeDisplay(t) {
    const y = Math.floor(t);
    const frac = t - y;
    const m = Math.floor(frac * 12) + 1;
    // clamp m to 1..12
    const mc = Math.max(1, Math.min(12, m));
    document.getElementById('time-display').textContent =
      `${y}.${String(mc).padStart(2, '0')}`;
  }

  /* ===== B5 Dead End Watch =====
     规则: 某派系 last_paper <= (max_year - 0.5) 即认为 6 个月以上无新增。
     这里数据最新到 2026.6，参考基线为 data max year。
  */
  function computeDeadEndBadges() {
    const maxYear = Math.max(...state.data.nodes.map(n => n._year));
    const lastByFaction = {};
    state.data.nodes.forEach(n => {
      if (!lastByFaction[n.faction] || n._year > lastByFaction[n.faction]) {
        lastByFaction[n.faction] = n._year;
      }
    });
    state.deadEnd = {};
    Object.entries(state.data.meta.factions).forEach(([key, fac]) => {
      const last = lastByFaction[key] || 0;
      const silence = maxYear - last;
      state.deadEnd[key] = { last, silence: +silence.toFixed(2), isDead: silence >= 0.5 };
    });
  }

  /* ===== B1 Trending Now ===== */
  function setupTrendingSidebar() {
    document.getElementById('btn-trending-toggle').addEventListener('click', () => {
      const sb = document.getElementById('trending-sidebar');
      sb.classList.toggle('sidebar-closed');
      sb.classList.toggle('sidebar-open');
      renderTrending();
    });
    document.getElementById('btn-trending-close').addEventListener('click', () => {
      const sb = document.getElementById('trending-sidebar');
      sb.classList.add('sidebar-closed');
      sb.classList.remove('sidebar-open');
    });
  }

  function renderTrending() {
    const now = Math.max(...state.data.nodes.map(n => n._year));
    const cutoff = now - (30 / 365);
    // 各派系 30 天内新增 + 全部统计
    const byFaction = {};
    Object.keys(state.data.meta.factions).forEach(k => {
      byFaction[k] = { recent: 0, total: 0, recentIds: [] };
    });
    state.data.nodes.forEach(n => {
      byFaction[n.faction].total++;
      if (n._year >= cutoff) {
        byFaction[n.faction].recent++;
        byFaction[n.faction].recentIds.push(n);
      }
    });
    const maxRecent = Math.max(1, ...Object.values(byFaction).map(s => s.recent));
    const maxTotal = Math.max(1, ...Object.values(byFaction).map(s => s.total));

    // Bar 列表 (SVG)
    const barsHost = document.getElementById('trending-bars');
    barsHost.innerHTML = '';
    const facKeys = Object.keys(state.data.meta.factions);
    facKeys.forEach(key => {
      const fac = state.data.meta.factions[key];
      const r = byFaction[key];
      const row = document.createElement('div');
      row.className = 'bar-row';
      const recentW = (r.recent / maxRecent) * 100;
      const totalW = (r.total / maxTotal) * 100;
      row.innerHTML = `
        <div class="bar-key">
          <span class="bar-dot" style="background:${fac.color}"></span>
          <span>${key}</span>
          <span class="bar-num">${r.recent}<span class="bar-num-sub">/${r.total}</span></span>
        </div>
        <div class="bar-track" title="${key}: ${r.recent} 篇最近 30 天 / ${r.total} 篇总数">
          <div class="bar-fill bar-recent" style="width:${recentW}%; background:${fac.color}; opacity:0.95;"></div>
          <div class="bar-fill bar-total" style="width:${totalW}%; background:${fac.color}; opacity:0.35;"></div>
        </div>
      `;
      // hover 数字
      row.addEventListener('mouseenter', () => {
        const tip = document.getElementById('tooltip');
        tip.innerHTML = `<div class="tt-title">${key} · ${fac.name}</div>
          <div class="tt-row"><span class="tt-k">最近30天</span><strong>${r.recent} 篇</strong></div>
          <div class="tt-row"><span class="tt-k">总论文</span><strong>${r.total} 篇</strong></div>`;
        tip.style.display = 'block';
      });
      row.addEventListener('mousemove', e => moveTooltip(e));
      row.addEventListener('mouseleave', () => hideTooltip());
      barsHost.appendChild(row);
    });

    // 最近 30 天论文列表
    const recentHost = document.getElementById('trending-recent-list');
    recentHost.innerHTML = '';
    const recentPapers = state.data.nodes
      .filter(n => n._year >= cutoff)
      .sort((a, b) => b._year - a._year)
      .slice(0, 12);
    if (recentPapers.length === 0) {
      recentHost.innerHTML = '<div class="empty-state">无最近 30 天论文</div>';
    } else {
      recentPapers.forEach(p => {
        const fac = state.data.meta.factions[p.faction];
        const item = document.createElement('div');
        item.className = 'recent-item';
        item.style.borderLeftColor = fac.color;
        const yr = Math.floor(p._year);
        const mo = Math.floor((p._year - yr) * 12) + 1;
        item.innerHTML = `
          <div class="recent-meta">
            <span class="recent-dot" style="background:${fac.color}"></span>
            <span>${p.faction} · ${yr}.${String(mo).padStart(2, '0')}</span>
          </div>
          <div class="recent-title">${p.label}</div>
        `;
        item.addEventListener('click', () => openModal(p));
        recentHost.appendChild(item);
      });
    }

    // 派生指标
    const metricsHost = document.getElementById('trending-metrics');
    const totalRecent = Object.values(byFaction).reduce((a, s) => a + s.recent, 0);
    const hottest = facKeys.reduce((a, b) => byFaction[a].recent > byFaction[b].recent ? a : b, facKeys[0]);
    const deadFactions = Object.entries(state.deadEnd).filter(([k, v]) => v.isDead).map(([k]) => k);
    metricsHost.innerHTML = `
      <div class="metric-row"><span>📈 30 天新文</span><strong>${totalRecent}</strong></div>
      <div class="metric-row"><span>🔥 最热派系</span><strong style="color:${state.data.meta.factions[hottest].color}">${hottest} (${byFaction[hottest].recent})</strong></div>
      <div class="metric-row"><span>❄️ 静默派系</span><strong>${deadFactions.length === 0 ? '无' : deadFactions.join(', ')}</strong></div>
    `;
  }

  /* ===== C3 议题搜索 ===== */
  function setupSearchHud() {
    const input = document.getElementById('topic-search');
    const countEl = document.getElementById('search-count');
    let debounce = null;
    input.addEventListener('input', (e) => {
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        state.searchTerm = e.target.value.trim().toLowerCase();
        applySearchFilter();
        if (state.searchTerm) {
          const matches = state.data.nodes.filter(matchesSearch).length;
          countEl.textContent = `匹配 ${matches} / ${state.data.nodes.length}`;
          renderSearchPie();
          document.getElementById('search-pie-card').classList.remove('hidden');
        } else {
          countEl.textContent = '';
          document.getElementById('search-pie-card').classList.add('hidden');
        }
      }, 150);
    });
  }

  function matchesSearch(n) {
    if (!state.searchTerm) return false;
    const hay = ((n.label || '') + ' ' + (n.faction || '') + ' ' + (n.rating || '')).toLowerCase();
    return state.searchTerm.split(/\s+/).every(t => hay.includes(t));
  }

  function applySearchFilter() {
    if (!state.gNodes) return;
    if (!state.searchTerm) {
      state.gNodes.selectAll('g.node')
        .style('opacity', d => state.factionEnabled[d.faction] ? 1 : 0)
        .classed('search-match', false)
        .classed('search-dim', false);
      state.gLinks.selectAll('line').style('opacity', null);
      return;
    }
    state.gNodes.selectAll('g.node')
      .style('opacity', d => {
        if (!state.factionEnabled[d.faction]) return 0;
        return matchesSearch(d) ? 1 : 0.18;
      })
      .classed('search-match', d => matchesSearch(d))
      .classed('search-dim', d => state.searchTerm && !matchesSearch(d) && state.factionEnabled[d.faction]);

    state.gLinks.selectAll('line')
      .style('opacity', d => {
        const s = typeof d.source === 'object' ? d.source : state.data.nodes.find(n => n.id === d.source);
        const tgt = typeof d.target === 'object' ? d.target : state.data.nodes.find(n => n.id === d.target);
        if (!s || !tgt) return 0;
        if (!matchesSearch(s) && !matchesSearch(tgt)) return 0.04;
        if (matchesSearch(s) && matchesSearch(tgt)) return d.type === 'direct' ? 0.85 : 0.4;
        return 0.45;
      });
  }

  function renderSearchPie() {
    const host = document.getElementById('search-pie');
    host.innerHTML = '';
    const counts = {};
    Object.keys(state.data.meta.factions).forEach(k => counts[k] = 0);
    state.data.nodes.forEach(n => {
      if (matchesSearch(n)) counts[n.faction]++;
    });
    const total = Object.values(counts).reduce((a, b) => a + b, 0);
    if (total === 0) {
      host.innerHTML = '<div style="font-size:11px;color:#6c7086;text-align:center;padding:8px">无匹配</div>';
      document.getElementById('search-pie-label').textContent = '';
      return;
    }
    const W = 100, R = 38, CX = 50, CY = 50;
    let acc = 0;
    const svgNs = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNs, 'svg');
    svg.setAttribute('viewBox', `0 0 ${W} ${W}`);
    svg.setAttribute('width', '110');
    svg.setAttribute('height', '110');
    Object.entries(counts).forEach(([k, c]) => {
      if (c === 0) return;
      const frac = c / total;
      const a0 = acc * Math.PI * 2 - Math.PI / 2;
      const a1 = (acc + frac) * Math.PI * 2 - Math.PI / 2;
      acc += frac;
      const x0 = CX + R * Math.cos(a0), y0 = CY + R * Math.sin(a0);
      const x1 = CX + R * Math.cos(a1), y1 = CY + R * Math.sin(a1);
      const large = frac > 0.5 ? 1 : 0;
      const path = document.createElementNS(svgNs, 'path');
      const d = `M ${CX} ${CY} L ${x0} ${y0} A ${R} ${R} 0 ${large} 1 ${x1} ${y1} Z`;
      path.setAttribute('d', d);
      path.setAttribute('fill', state.data.meta.factions[k].color);
      path.setAttribute('stroke', '#181825');
      path.setAttribute('stroke-width', '1.5');
      path.setAttribute('opacity', '0.92');
      svg.appendChild(path);
    });
    // 中心文字
    const text = document.createElementNS(svgNs, 'text');
    text.setAttribute('x', CX);
    text.setAttribute('y', CY + 4);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#f9e2af');
    text.setAttribute('font-size', '14');
    text.setAttribute('font-weight', '800');
    text.textContent = total;
    svg.appendChild(text);
    host.appendChild(svg);

    const legend = Object.entries(counts)
      .filter(([k, c]) => c > 0)
      .map(([k, c]) => {
        const f = state.data.meta.factions[k];
        const pct = ((c / total) * 100).toFixed(0);
        return `<span style="color:${f.color}">${k}·${c}</span> <span style="color:#6c7086">${pct}%</span>`;
      })
      .join(' · ');
    document.getElementById('search-pie-label').innerHTML = legend;
  }

  /* ===== 派系 hull 计算 + 平滑曲线生成 =====
     思路:
       1) 收集当前派系"可见"节点 (考虑时间轴 + 派系筛选 + 搜索)
       2) 对每节点构造 padded point (半径 + padding 像素)
       3) d3.polygonHull 求凸包
       4) Catmull-Rom-like 平滑: 对凸包每个顶点用前后两点做切线，
          生成二次贝塞尔曲线连接，得到闭合平滑曲线
       5) 返回 path 'd' 字符串 (含 halo + bg 两版 padding)
  */
  function paddedHullPoints(nodes, padding) {
    if (!nodes || nodes.length === 0) return [];
    // 单节点: 退化为一个圆周 16 点近似
    if (nodes.length === 1) {
      const n = nodes[0];
      const r = (n.__padR || 14) + padding;
      const pts = [];
      for (let k = 0; k < 16; k++) {
        const a = (k / 16) * Math.PI * 2;
        pts.push([n.x + Math.cos(a) * r, n.y + Math.sin(a) * r]);
      }
      return pts;
    }
    // 多节点: 把每个节点当 16 点离散圆采样 (更密 → hull 后曲线感更强)
    const all = [];
    nodes.forEach(n => {
      const r = (n.__padR || 14) + padding;
      const cx = n.x, cy = n.y;
      for (let k = 0; k < 16; k++) {
        const a = (k / 16) * Math.PI * 2;
        all.push([cx + Math.cos(a) * r, cy + Math.sin(a) * r]);
      }
    });
    return all;
  }

  // 平滑闭合贝塞尔 (Catmull-Rom -> Bezier 转换)
  function smoothClosedPath(points) {
    if (!points || points.length === 0) return '';
    if (points.length < 3) {
      return points.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ') + ' Z';
    }
    // d3 原生 curveCardinalClosed: 在闭合曲线上自动取前后点生成 Cardinal/Catmull-Rom 样条，
    // 比手写 C 控制点更稳; tension 越接近 1 越圆，越接近 0 越直.
    const lineGen = d3.line()
      .x(d => d[0])
      .y(d => d[1])
      .curve(d3.curveCardinalClosed.tension(0.95));
    return lineGen(points);
  }

  // 给派系算 hull path (考虑时间轴 / 派系开关 / 搜索筛选)
  function computeFactionHull(factionKey) {
    if (!state.data) return { bg: '', halo: '', top: null, count: 0 };
    const t = state.currentTime || state.timeMax;
    const visibleNodes = state.data.nodes.filter(n => {
      if (n.faction !== factionKey) return false;
      if (!state.factionEnabled[factionKey]) return false;
      if (state.currentTime > 0 && n._year > t) return false;
      if (state.searchTerm) {
        if (!matchesSearch(n)) return false;
      }
      return true;
    });
    if (visibleNodes.length === 0) return { bg: '', halo: '', top: null, count: 0 };
    visibleNodes.forEach(n => {
      n.__padR = 8 + (n.rating && n.rating.includes('⭐⭐⭐') ? 3 : 0);
    });
    // padding 调小：bg 8 / halo 14 —— 避免 hull 太大互相重叠
    const haloPts = d3.polygonHull(paddedHullPoints(visibleNodes, 14));
    const bgPts = d3.polygonHull(paddedHullPoints(visibleNodes, 8));
    // 对 hull 顶点二次加密: 每两个相邻点之间插 (SUBDIV-1) 个等分点 → 让 Cardinal 闭合曲线明显圆滑
    const SUBDIV = 4;
    const densify = (pts) => {
      if (!pts || pts.length < 3) return pts || [];
      const out = [];
      for (let i = 0; i < pts.length; i++) {
        const a = pts[i];
        const b = pts[(i + 1) % pts.length];
        for (let k = 0; k < SUBDIV; k++) {
          const f = k / SUBDIV;
          out.push([a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f]);
        }
      }
      return out;
    };
    const denseBg = densify(bgPts);
    const denseHalo = densify(haloPts);
    let topY = Infinity, topX = 0;
    if (bgPts && bgPts.length) {
      bgPts.forEach(p => { if (p[1] < topY) { topY = p[1]; topX = p[0]; } });
    }
    return {
      bg: smoothClosedPath(denseBg),
      halo: smoothClosedPath(denseHalo),
      top: { x: topX, y: topY },
      count: visibleNodes.length,
    };
  }

  // 刷新所有派系 hull (tick 中调用)
  function refreshFactionHulls() {
    if (!state.svg) return;
    const factionKeys = Object.keys(state.data.meta.factions);
    const topClamp = 40;   // 标签顶部不能高于 viewport 顶部 40px
    const botClamp = state.height - 40; // 不能低于 viewport 底部 40px
    const leftClamp = 410; // x 不能太靠边（避开左侧信息卡约 320px + labelGroup anchor middle 100px）
    const rightClamp = state.width - 100;
    factionKeys.forEach(key => {
      const h = computeFactionHull(key);
      // halo / bg: 直接 .attr('d', ...) 每帧重算
      state.svg.selectAll('.cluster-halo.cluster-' + key).attr('d', h.halo);
      state.svg.selectAll('.cluster-bg.cluster-' + key).attr('d', h.bg);
      // 徽章位置: 贴 hull 顶部上方 12px, 并 clamp 到 viewport 内
      const top = h.top;
      if (top && h.count > 0) {
        const clampedY = Math.max(topClamp, Math.min(botClamp, top.y - 16));
        const clampedX = Math.max(leftClamp, Math.min(rightClamp, top.x));
        state.svg.selectAll('.cluster-badge.cluster-' + key)
          .attr('x', clampedX - 90)
          .attr('y', clampedY - 18);
        state.svg.selectAll('.cluster-label-group.cluster-' + key)
          .attr('transform', `translate(${clampedX}, ${clampedY})`);
      } else {
        // 不可见时给个离屏位置
        state.svg.selectAll('.cluster-badge.cluster-' + key).attr('x', -9999).attr('y', -9999);
        state.svg.selectAll('.cluster-label-group.cluster-' + key).attr('transform', 'translate(-9999,-9999)');
      }
    });
  }

  /* ===== 力导向图：派系聚类布局 ===== */
  function setupGraph() {
    const container = document.getElementById('app');
    state.width = window.innerWidth;
    state.height = window.innerHeight;
    const svg = d3.select('#canvas-graph')
      .attr('width', state.width)
      .attr('height', state.height);
    state.svg = svg;

    svg.selectAll('*').remove();

    // 派系 cluster 背景 (改为可变换的闭合平滑曲线)
    const clusterGroup = svg.append('g').attr('class', 'clusters');
    // 独立的 labels layer — 在 nodes/links 之后 append, 保证标签永远在最上层不被节点遮挡
    state.clusterLabelsLayer = svg.append('g').attr('class', 'cluster-labels');
    const factionKeys = Object.keys(state.data.meta.factions);
    // 派系中心放在五角星顶点，半径加大避免重叠（0.30 → 0.42）
    const radius = Math.min(state.width, state.height) * 0.42;
    factionKeys.forEach((key, i) => {
      const fac = state.data.meta.factions[key];
      const angle = (i / factionKeys.length) * Math.PI * 2 - Math.PI / 2;
      const cx = state.width / 2 + Math.cos(angle) * radius;
      const cy = state.height / 2 + Math.sin(angle) * radius;
      state.factionCenters[key] = { x: cx, y: cy };
      const nodeCount = state.data.nodes.filter(n => n.faction === key).length;
      const de = state.deadEnd && state.deadEnd[key];
      const isDead = de && de.isDead;

      // halo: hull 的描边轮廓 (padding +6)
      clusterGroup.append('path')
        .attr('d', '')
        .attr('fill', 'none').attr('stroke', fac.color).attr('stroke-opacity', 0.12).attr('stroke-width', 5)
        .attr('class', 'cluster-halo cluster-' + key);
      // bg: hull 填充 + 描边（透明度调低避免重叠区颜色叠加过重）
      clusterGroup.append('path')
        .attr('d', '')
        .attr('fill', fac.color).attr('fill-opacity', 0.05)
        .attr('stroke', fac.color).attr('stroke-opacity', isDead ? 0.45 : 0.75).attr('stroke-width', isDead ? 1.8 : 2.0)
        .attr('class', 'cluster-bg cluster-' + key + (isDead ? ' cluster-dead' : ''));
      // 派系徽章背景条 (位置由 hull 顶部动态决定，初始放中心) — 提到 labelsLayer 避免被节点遮挡
      state.clusterLabelsLayer.append('rect')
        .attr('x', cx - 90).attr('y', cy - 100)
        .attr('width', 180).attr('height', 22).attr('rx', 11)
        .attr('fill', '#1e1e2e').attr('fill-opacity', 0.78)
        .attr('stroke', fac.color).attr('stroke-opacity', 0.55).attr('stroke-width', 1.5)
        .attr('class', 'cluster-badge cluster-' + key)
        .attr('pointer-events', 'none');
      // 派系标签 + dead-end 徽标 (位置由 hull 顶部动态决定) — 放进独立 layer 后面会提到 nodes 之上
      const labelGroup = state.clusterLabelsLayer.append('g')
        .attr('class', 'cluster-label-group cluster-' + key)
        .attr('transform', `translate(${cx}, ${cy - 82})`);
      labelGroup.append('text')
        .attr('text-anchor', 'middle')
        .attr('fill', fac.color).attr('font-size', '18').attr('font-weight', '800')
        .attr('opacity', 1).attr('class', 'cluster-label cluster-' + key)
        .attr('filter', 'drop-shadow(0 0 4px rgba(0,0,0,0.9)) drop-shadow(0 0 8px ' + fac.color + ')')
        .text(`${key} · ${fac.name} (${nodeCount})`);
      if (isDead) {
        labelGroup.append('text')
          .attr('x', 92).attr('y', 6)
          .attr('text-anchor', 'end')
          .attr('fill', '#a6adc8').attr('font-size', '13').attr('font-weight', '800')
          .attr('class', 'cluster-dead-badge')
          .attr('filter', 'drop-shadow(0 0 4px rgba(0,0,0,0.9))')
          .text('❄️ 静默');
      }
    });

    const containerG = svg.append('g').attr('class', 'graph-content');
    state.gLinks = containerG.append('g').attr('class', 'links');
    state.gNodes = containerG.append('g').attr('class', 'nodes');

    const linksForSim = state.data.edges.map(e => ({ source: e.from, target: e.to, type: e.type }));
    const simulation = d3.forceSimulation(state.data.nodes)
      .force('link', d3.forceLink(linksForSim).id(d => d.id).distance(50).strength(0.3))
      // charge 加强：-450 → -550，节点相互排斥避免堆叠
      .force('charge', d3.forceManyBody().strength(-550))
      // collision 加大：45 → 50，给节点更大安全距离
      .force('collision', d3.forceCollide().radius(50))
      // 派系强引力：1.2 → 1.6，让节点真正按派系分开、避免跨派系乱飞
      .force('factionX', d3.forceX().x(d => state.factionCenters[d.faction]?.x || state.width / 2).strength(1.6))
      .force('factionY', d3.forceY().y(d => state.factionCenters[d.faction]?.y || state.height / 2).strength(1.6))
      .force('center', d3.forceCenter(state.width / 2, state.height / 2).strength(0.003));

    state.simulation = simulation;

    const link = state.gLinks
      .selectAll('line').data(linksForSim).join('line')
      .attr('class', d => 'edge edge-' + d.type)
      .attr('stroke', d => d.type === 'direct' ? '#fab387' : '#6c7086')
      .attr('stroke-width', d => d.type === 'direct' ? 1.6 : 0.6)
      .attr('stroke-opacity', d => d.type === 'direct' ? 0.55 : 0.3);

    const nodeG = state.gNodes
      .selectAll('g.node').data(state.data.nodes).join('g')
      .attr('class', d => 'node node-faction-' + d.faction)
      .style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', dragStarted).on('drag', dragged).on('end', dragEnded))
      .on('mouseover', (e, d) => showTooltip(e, d))
      .on('mousemove', (e) => moveTooltip(e))
      .on('mouseout', () => hideTooltip())
      .on('click', (e, d) => openModal(d));

    nodeG.filter(d => d.rating && d.rating.includes('⭐⭐⭐'))
      .append('circle').attr('r', 18).attr('fill', 'none')
      .attr('stroke', '#f9e2af').attr('stroke-width', 2).attr('stroke-dasharray', '3,2')
      .attr('class', 'node-highlight');

    nodeG.append('circle')
      .attr('class', 'node-main')
      .attr('r', d => 8 + (d.rating && d.rating.includes('⭐⭐⭐') ? 3 : 0))
      .attr('fill', d => state.data.meta.factions[d.faction].color)
      .attr('stroke', '#1e1e2e').attr('stroke-width', 1.5);

    nodeG.append('circle')
      .attr('class', 'node-inner')
      .attr('r', d => d.rating && d.rating.includes('⭐⭐⭐') ? 4 : (d.rating && d.rating.includes('⭐⭐') ? 3 : 2))
      .attr('fill', d => d.rating && d.rating.includes('⭐⭐⭐') ? '#f9e2af' : (d.rating && d.rating.includes('⭐⭐') ? '#45475a' : '#313244'));

    nodeG.append('text')
      .attr('class', 'node-year')
      .attr('text-anchor', 'middle').attr('dy', '0.35em')
      .attr('fill', '#f9e2af').attr('font-size', '13px').attr('font-weight', '900')
      .attr('pointer-events', 'none')
      .attr('paint-order', 'stroke').attr('stroke', '#11111b').attr('stroke-width', '3')
      .attr('stroke-linejoin', 'round')
      .text(d => {
        const s = String(d.year);
        const m = s.match(/^(\d{4})/);
        if (m) {
          const yyyy = m[1];
          return yyyy.startsWith('20') ? yyyy.slice(2, 4) : yyyy.slice(0, 2);
        }
        return s;
      });

    nodeG.append('text')
      .attr('class', 'node-label')
      .attr('text-anchor', 'middle').attr('dy', '26px')
      .attr('fill', '#cdd6f4').attr('font-size', '11px').attr('font-weight', '700')
      .attr('pointer-events', 'none')
      .attr('paint-order', 'stroke').attr('stroke', '#11111b').attr('stroke-width', '2.5')
      .attr('stroke-linejoin', 'round')
      .text(d => {
        const l = d.label;
        if (l.length <= 18) return l;
        return l.slice(0, 18) + '…';
      });

    simulation.on('tick', () => {
      link
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      nodeG.attr('transform', d => `translate(${d.x},${d.y})`);
      // 每帧重算派系 hull path (避免每帧都重算太多)
      refreshFactionHulls();
    });

    const zoom = d3.zoom()
      .scaleExtent([0.3, 2.5])
      .on('zoom', (event) => { containerG.attr('transform', event.transform); });
    svg.call(zoom);

    window.addEventListener('resize', () => {
      state.width = window.innerWidth;
      state.height = window.innerHeight;
      svg.attr('width', state.width).attr('height', state.height);
    });

    // 应用初始时间轴状态 (state.currentTime 已在 init 中初始化)
    applyTimeFilter();
  }

  function dragStarted(event, d) {
    if (!event.active) state.simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
  }
  function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
  }
  function dragEnded(event, d) {
    if (!event.active) state.simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
  }

  /* ===== Tooltip ===== */
  function fmtYear(y) {
    const s = String(y);
    const m = s.match(/^(\d{4})/);
    if (m) {
      const yyyy = m[1];
      if (yyyy.startsWith('20')) return yyyy;
      return '20' + yyyy.slice(0, 2);
    }
    return s;
  }

  function showTooltip(e, d) {
    const tt = document.getElementById('tooltip');
    const faction = state.data.meta.factions[d.faction];
    const arxivUrl = d.arxiv ? `https://arxiv.org/abs/${d.arxiv}` : '';
    tt.innerHTML = `
      <div class="tt-title">${d.label}</div>
      <div class="tt-row"><span class="tt-k">派系</span><strong style="color:${faction.color}">${d.faction} · ${faction.name}</strong></div>
      <div class="tt-row"><span class="tt-k">年份</span><strong>${fmtYear(d.year)} (${d._year.toFixed(2)})</strong></div>
      <div class="tt-row"><span class="tt-k">评级</span><strong>${d.rating || '-'}</strong></div>
      <div class="tt-row"><span class="tt-k">arxiv</span><strong>${arxivUrl ? `<a href="${arxivUrl}" target="_blank">${d.arxiv}</a>` : '-'}</strong></div>
      <div class="tt-row tt-id"><span class="tt-k">id</span><code>${d.id}</code></div>
    `;
    tt.style.display = 'block';
    moveTooltip(e);
    highlightFaction(d.faction);
  }

  function moveTooltip(e) {
    const tt = document.getElementById('tooltip');
    const ttW = tt.offsetWidth || 280;
    const ttH = tt.offsetHeight || 120;
    let x = e.clientX + 16;
    let y = e.clientY + 16;
    if (x + ttW > window.innerWidth - 8) x = e.clientX - ttW - 16;
    if (y + ttH > window.innerHeight - 8) y = e.clientY - ttH - 16;
    tt.style.left = x + 'px';
    tt.style.top = y + 'px';
  }

  function hideTooltip() {
    document.getElementById('tooltip').style.display = 'none';
    clearFactionHighlight();
  }

  function highlightFaction(factionKey) {
    if (!state.gNodes) return;
    const DIM = 0.18;
    state.gNodes.selectAll('g.node').style('opacity', d => d.faction === factionKey ? 1 : DIM);
    state.gLinks.selectAll('line').style('opacity', d => {
      const s = typeof d.source === 'object' ? d.source : state.data.nodes.find(n => n.id === d.source);
      const t = typeof d.target === 'object' ? d.target : state.data.nodes.find(n => n.id === d.target);
      if (!s || !t) return 0;
      return (s.faction === factionKey && t.faction === factionKey) ? 0.85 : 0.05;
    });
    // 用 d3 transition 平滑切换 (300ms)
    Object.keys(state.factionCenters).forEach(key => {
      const isActive = key === factionKey;
      const tr = d3.transition().duration(300);
      state.svg.selectAll('.cluster-bg.cluster-' + key).transition(tr)
        .style('opacity', isActive ? 1 : 0.22)
        .attr('stroke-width', isActive ? 3.5 : 2.5)
        .attr('stroke-opacity', isActive ? 1 : 0.4);
      state.svg.selectAll('.cluster-label.cluster-' + key).transition(tr).style('opacity', isActive ? 1 : 0.25);
      state.svg.selectAll('.cluster-badge.cluster-' + key).transition(tr).style('opacity', isActive ? 1 : 0.25);
      state.svg.selectAll('.cluster-halo.cluster-' + key).transition(tr).style('opacity', isActive ? 0 : 1.0);
    });
  }

  function clearFactionHighlight() {
    if (!state.gNodes) return;
    state.gNodes.selectAll('g.node').style('opacity', 1);
    state.gLinks.selectAll('line').style('opacity', null);
    const tr = d3.transition().duration(300);
    Object.keys(state.factionCenters).forEach(key => {
      state.svg.selectAll('.cluster-bg.cluster-' + key).transition(tr)
        .style('opacity', 1)
        .attr('stroke-width', 2.5)
        .attr('stroke-opacity', 0.85);
      state.svg.selectAll('.cluster-label.cluster-' + key).transition(tr).style('opacity', 1);
      state.svg.selectAll('.cluster-badge.cluster-' + key).transition(tr).style('opacity', 1);
      state.svg.selectAll('.cluster-halo.cluster-' + key).transition(tr).style('opacity', 1);
    });
    // 恢复时间轴/搜索对 opacity 的覆盖
    if (state.searchTerm) applySearchFilter();
    else if (state.currentTime > 0) applyTimeFilter();
  }

  function openModal(node) {
    const modal = document.getElementById('modal');
    const faction = state.data.meta.factions[node.faction];
    document.getElementById('modal-title').textContent = node.label;
    document.getElementById('modal-body').innerHTML = `
      <div class="modal-row">派系: <strong style="color:${faction.color}">${node.faction} · ${faction.name}</strong></div>
      <div class="modal-row">时间: <strong>${node.year} (≈${node._year.toFixed(2)})</strong></div>
      <div class="modal-row">评级: <strong>${node.rating || '-'}</strong></div>
      <div class="modal-row">arxiv: <strong><a href="https://arxiv.org/abs/${node.arxiv}" target="_blank">${node.arxiv}</a></strong></div>
      <div class="modal-row" style="margin-top:10px">
        <a href="../appendix/paper-notes/${node.id}.md" target="_blank">📄 查看 paper note</a>
      </div>
    `;
    modal.classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
  }

  function updateVisibility() {
    if (!state.gNodes) return;
    state.gNodes.selectAll('g.node')
      .style('display', d => state.factionEnabled[d.faction] ? null : 'none');
    state.gLinks.selectAll('line')
      .style('display', d => {
        const sourceNode = typeof d.source === 'object' ? d.source : state.data.nodes.find(n => n.id === d.source);
        const targetNode = typeof d.target === 'object' ? d.target : state.data.nodes.find(n => n.id === d.target);
        if (!sourceNode || !targetNode) return 'none';
        return state.factionEnabled[sourceNode.faction] && state.factionEnabled[targetNode.faction] ? null : 'none';
      });
    // 修复: 用 selectAll + filter 选所有 cluster-X 相关元素 (bg/halo/badge/label-group)
    Object.keys(state.factionCenters).forEach(key => {
      const visible = state.factionEnabled[key];
      const sel = state.svg.selectAll(
        `.cluster-bg.cluster-${key}, .cluster-halo.cluster-${key}, .cluster-badge.cluster-${key}, .cluster-label-group.cluster-${key}`
      );
      sel.style('display', visible ? null : 'none');
    });
    // 派系开关变了 hull 必刷新 (visible 集合变化)
    if (state.svg) refreshFactionHulls();
  }

  /* ===== 启动 ===== */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  </script>
</body>
</html>
